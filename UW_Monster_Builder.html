<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<script>
  // Unregister any service workers and clear all caches on load
  if('serviceWorker' in navigator){
    navigator.serviceWorker.getRegistrations().then(regs=>{
      regs.forEach(r=>r.unregister());
    });
  }
  if('caches' in window){
    caches.keys().then(keys=>keys.forEach(k=>caches.delete(k)));
  }
</script>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UW Monster Builder</title>
<style>

  :root {
    --color-text-primary: #1a1a1a;
    --color-text-secondary: #6b6b6b;
    --color-text-tertiary: #9b9b9b;
    --color-text-success: #2d6a2d;
    --color-text-danger: #a32d2d;
    --color-text-warning: #854f0b;
    --color-text-info: #185fa5;
    --color-background-primary: #ffffff;
    --color-background-secondary: #f5f5f3;
    --color-background-tertiary: #eeeeeb;
    --color-background-success: #eaf3de;
    --color-background-danger: #fcebeb;
    --color-background-warning: #faeeda;
    --color-background-info: #e6f1fb;
    --color-border-tertiary: rgba(0,0,0,0.1);
    --color-border-secondary: rgba(0,0,0,0.2);
    --color-border-success: #3b6d11;
    --color-border-danger: #a32d2d;
    --color-border-warning: #854f0b;
    --color-border-info: #185fa5;
    --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    --border-radius-md: 8px;
    --border-radius-lg: 12px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --color-text-primary: #e8e8e8;
      --color-text-secondary: #a0a0a0;
      --color-text-tertiary: #6b6b6b;
      --color-text-success: #97c459;
      --color-text-danger: #f09595;
      --color-text-warning: #ef9f27;
      --color-text-info: #85b7eb;
      --color-background-primary: #1e1e1e;
      --color-background-secondary: #2a2a2a;
      --color-background-tertiary: #333333;
      --color-background-success: #173404;
      --color-background-danger: #501313;
      --color-background-warning: #412402;
      --color-background-info: #042c53;
      --color-border-tertiary: rgba(255,255,255,0.1);
      --color-border-secondary: rgba(255,255,255,0.2);
      --color-border-success: #639922;
      --color-border-danger: #e24b4a;
      --color-border-warning: #ba7517;
      --color-border-info: #378add;
    }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--font-sans); font-size: 15px; color: var(--color-text-primary); background: var(--color-background-secondary); padding: 1.5rem; min-height: 100vh; }
  .app { max-width: 960px; margin: 0 auto; padding-bottom: 3rem; }

  /* Summary panel */
  .summary-panel { border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-lg); background: var(--color-background-primary); margin-bottom: 1.5rem; overflow: hidden; }
  .summary-top { display: grid; grid-template-columns: 1fr 1fr; }
  .summary-left { padding: 1.25rem; border-right: 0.5px solid var(--color-border-tertiary); }
  .summary-right { padding: 1.25rem; }
  .panel-label { font-size: 11px; font-weight: 500; letter-spacing: 1.5px; text-transform: uppercase; color: var(--color-text-secondary); margin-bottom: 0.875rem; }
  .fields-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px 16px; }
  .field-item { display: flex; flex-direction: column; gap: 3px; }
  .field-item.full { grid-column: 1 / -1; }
  .field-lbl { font-size: 11px; color: var(--color-text-secondary); }
  input[type=text], input[type=number], select { width: 100%; padding: 5px 8px; font-size: 14px; font-family: var(--font-sans); border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); background: var(--color-background-primary); color: var(--color-text-primary); }
  input[type=text]:focus, input[type=number]:focus, select:focus { outline: none; box-shadow: 0 0 0 2px var(--color-border-info); }

  /* Stats bar */
  .stats-bar { display: flex; flex-wrap: wrap; border-top: 0.5px solid var(--color-border-tertiary); }
  .stat-cell { flex: 1; min-width: 80px; padding: 0.75rem 1rem; border-right: 0.5px solid var(--color-border-tertiary); display: flex; flex-direction: column; gap: 3px; }
  .stat-cell:last-child { border-right: none; }
  .stat-lbl { font-size: 11px; color: var(--color-text-secondary); white-space: nowrap; }
  .stat-val { font-size: 15px; font-weight: 500; }
  .stat-val.danger { color: var(--color-text-danger); }
  .stat-sub { font-size: 10px; color: var(--color-text-danger); margin-top: 1px; }

  /* Skills acquired panel */
  .skills-right-list { display: flex; flex-direction: column; gap: 6px; max-height: 160px; overflow-y: auto; }
  .skills-group-label { font-size: 10px; font-weight: 500; letter-spacing: 1px; text-transform: uppercase; color: var(--color-text-tertiary); margin-top: 4px; }
  .skills-group-label:first-child { margin-top: 0; }
  .skill-tag { display: flex; align-items: center; justify-content: space-between; border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-md); padding: 3px 8px; font-size: 12px; }
  .skill-tag.granted { background: var(--color-background-success); border-color: var(--color-border-success); }
  .skill-tag.granted .stag-name { color: var(--color-text-success); }
  .skill-tag.disadvantage { background: var(--color-background-danger); border-color: var(--color-border-danger); }
  .skill-tag.disadvantage .stag-name { color: var(--color-text-danger); }
  .skill-tag.purchased { background: var(--color-background-secondary); }
  .stag-name { font-weight: 500; font-size: 12px; }
  .stag-badge { font-size: 10px; padding: 1px 5px; border-radius: 100px; background: var(--color-background-tertiary); color: var(--color-text-secondary); }
  .empty-note { font-size: 12px; color: var(--color-text-tertiary); font-style: italic; }

  /* Skills section */
  .skills-page { display: flex; flex-direction: column; gap: 0.75rem; }
  .page-title { font-size: 11px; font-weight: 500; letter-spacing: 1.5px; text-transform: uppercase; color: var(--color-text-secondary); margin-bottom: 0.75rem; }
  .skills-layout { display: flex; flex-direction: column; gap: 0.75rem; }
  .detail-panel { border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); padding: 1.25rem; background: var(--color-background-primary); }
  .skill-categories { display: flex; flex-direction: column; gap: 0.75rem; }
  .skill-category-block { border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); overflow: hidden; }
  .skill-cat-header { padding: 9px 14px; background: var(--color-background-secondary); font-size: 12px; font-weight: 500; letter-spacing: 0.5px; color: var(--color-text-secondary); cursor: pointer; display: flex; justify-content: space-between; align-items: center; user-select: none; }
  .skill-cat-header:hover { background: var(--color-background-tertiary); }
  .skill-list { display: flex; flex-direction: column; }

  /* Skill rows */
  .skill-row { display: flex; align-items: center; justify-content: space-between; padding: 8px 14px; border-top: 0.5px solid var(--color-border-tertiary); cursor: pointer; transition: background 0.1s; }
  .skill-row:hover { background: var(--color-background-secondary); }
  .skill-row.owned { background: var(--color-background-success); }
  .skill-row.locked { opacity: 0.4; cursor: default; pointer-events: none; }
  .skill-row.locked:hover { background: transparent; }
  .skill-row-left { display: flex; flex-direction: column; gap: 2px; flex: 1; min-width: 0; }
  .skill-row-name { font-size: 13px; font-weight: 500; }
  .skill-row.owned .skill-row-name { color: var(--color-text-success); }
  .tags { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 2px; }
  .tag { font-size: 10px; padding: 1px 7px; border-radius: 100px; border: 0.5px solid var(--color-border-tertiary); color: var(--color-text-secondary); background: var(--color-background-primary); white-space: nowrap; }
  .tag.frag { background: var(--color-background-warning); border-color: var(--color-border-warning); color: var(--color-text-warning); }
  .tag.race-req { background: var(--color-background-warning); border-color: var(--color-border-warning); color: var(--color-text-warning); }
  .tag.lvl-req { background: var(--color-background-danger); border-color: var(--color-border-danger); color: var(--color-text-danger); }
  .tag.prereq-req { background: var(--color-background-info); border-color: var(--color-border-info); color: var(--color-text-info); }
  .skill-row-right { display: flex; align-items: center; gap: 6px; flex-shrink: 0; margin-left: 8px; }
  .cp-badge { font-size: 12px; font-weight: 500; color: var(--color-text-secondary); white-space: nowrap; }
  .count-badge { font-size: 11px; color: var(--color-text-secondary); white-space: nowrap; min-width: 28px; text-align: center; }
  .btn-sm { font-size: 13px; font-weight: 500; width: 26px; height: 26px; border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); background: var(--color-background-primary); color: var(--color-text-primary); cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-family: var(--font-sans); line-height: 1; }
  .btn-sm:hover { background: var(--color-background-secondary); }
  .btn-sm.minus { background: var(--color-background-danger); border-color: var(--color-border-danger); color: var(--color-text-danger); }
  .btn-sm.minus:hover { opacity: 0.8; }
  .btn-sm:disabled { opacity: 0.3; cursor: not-allowed; pointer-events: none; }

  /* Detail panel */
  .detail-panel { border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); padding: 1.25rem; background: var(--color-background-primary); position: sticky; top: 1.5rem; align-self: start; max-height: 82vh; overflow-y: auto; }
  .detail-empty { font-size: 13px; color: var(--color-text-tertiary); font-style: italic; text-align: center; padding: 2rem 0; }
  .detail-name { font-size: 16px; font-weight: 500; margin-bottom: 6px; }
  .detail-meta { display: flex; gap: 6px; margin-bottom: 0.875rem; flex-wrap: wrap; }
  .detail-desc { font-size: 13px; color: var(--color-text-secondary); line-height: 1.65; }
  .detail-stat-row { display: flex; justify-content: space-between; margin-top: 0.5rem; font-size: 13px; }
  .detail-stat-lbl { color: var(--color-text-secondary); }
  .detail-stat-val { font-weight: 500; }
  .detail-divider { border: none; border-top: 0.5px solid var(--color-border-tertiary); margin: 0.875rem 0; }
  .detail-actions { display: flex; gap: 8px; margin-top: 0.75rem; align-items: center; }
  .detail-count { font-size: 14px; font-weight: 500; min-width: 60px; text-align: center; color: var(--color-text-secondary); }
  .buy-btn { flex: 1; padding: 8px; border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); background: var(--color-background-primary); font-size: 13px; font-weight: 500; cursor: pointer; font-family: var(--font-sans); color: var(--color-text-primary); }
  .buy-btn:hover { background: var(--color-background-secondary); }
  .buy-btn.remove { background: var(--color-background-danger); border-color: var(--color-border-danger); color: var(--color-text-danger); }
  .buy-btn:disabled { opacity: 0.35; cursor: not-allowed; }
  .detail-lock-note { font-size: 12px; font-style: italic; margin-top: 0.625rem; padding: 6px 10px; border-radius: var(--border-radius-md); }
  .detail-lock-note.race { background: var(--color-background-warning); color: var(--color-text-warning); }
  .detail-lock-note.level { background: var(--color-background-danger); color: var(--color-text-danger); }
  .detail-lock-note.prereq { background: var(--color-background-info); color: var(--color-text-info); }
  .detail-lock-note.maxed { background: var(--color-background-tertiary); color: var(--color-text-secondary); }

  /* Confirm modal */
  .modal-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,0.45); display: flex; align-items: center; justify-content: center; z-index: 1000; }
  .modal { background: var(--color-background-primary); border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-lg); padding: 1.5rem; max-width: 400px; width: 90%; }
  .modal-title { font-size: 15px; font-weight: 500; margin-bottom: 0.75rem; }
  .modal-body { font-size: 13px; color: var(--color-text-secondary); line-height: 1.6; margin-bottom: 1rem; }
  .modal-affected { font-size: 12px; color: var(--color-text-danger); margin: 0.5rem 0 1rem; padding: 8px 10px; background: var(--color-background-danger); border-radius: var(--border-radius-md); }
  .modal-btns { display: flex; gap: 8px; }
  .modal-btn { flex: 1; padding: 8px 12px; border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); font-size: 13px; font-weight: 500; cursor: pointer; font-family: var(--font-sans); background: var(--color-background-primary); color: var(--color-text-primary); }
  .modal-btn:hover { background: var(--color-background-secondary); }
  .modal-btn.confirm { background: var(--color-background-danger); border-color: var(--color-border-danger); color: var(--color-text-danger); }
  .modal-btn.confirm:hover { opacity: 0.85; }

  /* Magic panel */
  .magic-panel { border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-lg); background: var(--color-background-primary); margin-bottom: 0.75rem; overflow: hidden; }
  .magic-panel-header { padding: 9px 14px; background: var(--color-background-secondary); font-size: 12px; font-weight: 500; letter-spacing: 0.5px; color: var(--color-text-secondary); cursor: pointer; display: flex; justify-content: space-between; align-items: center; user-select: none; }
  .magic-panel-header:hover { background: var(--color-background-tertiary); }
  .magic-header-sub { font-weight: 400; opacity: 0.7; margin-left: 6px; }
  .magic-chev { font-size: 10px; }
  .magic-panel-body { padding: 1rem 1.25rem 1.25rem; }
  .magic-section-label { font-size: 11px; font-weight: 500; letter-spacing: 1px; text-transform: uppercase; color: var(--color-text-tertiary); margin-bottom: 8px; }
  .magic-spheres-row { display: flex; gap: 10px; flex-wrap: wrap; }
  .magic-sphere-card { flex: 1; min-width: 140px; border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); padding: 10px 12px; background: var(--color-background-primary); }
  .magic-sphere-card.owned { border-color: var(--color-border-info); background: var(--color-background-info); }
  .magic-sphere-card.locked { opacity: 0.4; }
  .magic-sphere-title { font-size: 12px; font-weight: 500; margin-bottom: 6px; }
  .magic-sphere-card.owned .magic-sphere-title { color: var(--color-text-info); }
  .magic-sphere-actions { display: flex; gap: 6px; align-items: center; }
  .magic-sphere-select { flex: 1; font-size: 12px; padding: 3px 6px; border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); background: var(--color-background-primary); color: var(--color-text-primary); font-family: var(--font-sans); }
  .magic-sphere-btn { font-size: 12px; padding: 3px 10px; border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); background: var(--color-background-primary); color: var(--color-text-primary); cursor: pointer; font-family: var(--font-sans); white-space: nowrap; }
  .magic-sphere-btn:hover { background: var(--color-background-secondary); }
  .magic-sphere-btn.remove { background: var(--color-background-danger); border-color: var(--color-border-danger); color: var(--color-text-danger); }
  .magic-sphere-btn:disabled { opacity: 0.35; cursor: not-allowed; }
  .magic-levels-row { display: flex; gap: 8px; }
  .magic-level-card { flex: 1; border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-md); padding: 10px 8px; background: var(--color-background-primary); display: flex; flex-direction: column; align-items: center; gap: 6px; min-width: 0; }
  .magic-level-card.forced { border-color: var(--color-border-warning); background: var(--color-background-warning); }
  .magic-level-card.locked { opacity: 0.35; }
  .magic-level-card.complete { border-color: var(--color-border-success); background: var(--color-background-success); }
  .magic-level-title { font-size: 11px; font-weight: 500; color: var(--color-text-secondary); white-space: nowrap; }
  .magic-level-card.forced .magic-level-title { color: var(--color-text-warning); }
  .magic-level-card.complete .magic-level-title { color: var(--color-text-success); }
  .magic-level-cost { font-size: 10px; color: var(--color-text-tertiary); }
  .magic-slots-dots { display: flex; gap: 3px; flex-wrap: wrap; justify-content: center; }
  .magic-dot { width: 10px; height: 10px; border-radius: 50%; border: 1px solid var(--color-border-secondary); background: var(--color-background-secondary); }
  .magic-dot.filled { background: var(--color-text-info); border-color: var(--color-border-info); }
  .magic-dot.filled-warning { background: var(--color-text-warning); border-color: var(--color-border-warning); }
  .magic-dot.filled-success { background: var(--color-text-success); border-color: var(--color-border-success); }
  .magic-level-btns { display: flex; gap: 4px; align-items: center; }
  .magic-level-count { font-size: 11px; color: var(--color-text-secondary); min-width: 24px; text-align: center; }

  @media (max-width: 640px) {
    .summary-top { grid-template-columns: 1fr; }
    .summary-left { border-right: none; border-bottom: 0.5px solid var(--color-border-tertiary); }
    .skills-layout { grid-template-columns: 1fr; }
    .detail-panel { position: static; }
    .magic-levels-row { flex-wrap: wrap; }
    .magic-level-card { min-width: 60px; }
  }
/* print handled below */

  .dropdown-item { padding: 6px 10px; font-size: 12px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; gap: 8px; border-bottom: 0.5px solid var(--color-border-tertiary); }
  .dropdown-item:last-child { border-bottom: none; }
  .dropdown-item:hover, .dropdown-item.focused { background: var(--color-background-secondary); }
  .dropdown-item .item-name { flex: 1; }
  .dropdown-item .item-badge { font-size: 10px; padding: 1px 6px; border-radius: 100px; white-space: nowrap; flex-shrink: 0; }
  .badge-spell { background: var(--color-background-info); color: var(--color-text-info); border: 0.5px solid var(--color-border-info); }
  .badge-monster { background: var(--color-background-warning); color: var(--color-text-warning); border: 0.5px solid var(--color-border-warning); }
  .badge-skill { background: var(--color-background-success); color: var(--color-text-success); border: 0.5px solid var(--color-border-success); }
  .dropdown-group-label { padding: 5px 10px 3px; font-size: 10px; font-weight: 600; letter-spacing: 0.8px; text-transform: uppercase; color: var(--color-text-tertiary); background: var(--color-background-secondary); border-bottom: 0.5px solid var(--color-border-tertiary); position: sticky; top: 0; }
  .dropdown-none { padding: 10px; font-size: 12px; color: var(--color-text-tertiary); font-style: italic; text-align: center; }
  .count-input { padding: 7px 6px; font-size: 14px; font-family: var(--font-sans); border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); background: var(--color-background-primary); color: var(--color-text-primary); text-align: center; -moz-appearance: textfield; width: 100%; outline: none; }
  .count-input:focus { box-shadow: 0 0 0 2px var(--color-border-info); }
  .count-input::-webkit-outer-spin-button, .count-input::-webkit-inner-spin-button { -webkit-appearance: none; }
  .main-layout { display: grid; grid-template-columns: 1fr 300px; gap: 1rem; align-items: start; }
  .detail-panel { border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); padding: 1.25rem; background: var(--color-background-primary); position: sticky; top: 1.5rem; max-height: 82vh; overflow-y: auto; }
  .detail-name { font-size: 15px; font-weight: 500; margin-bottom: 6px; }
  .detail-meta-row { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 10px; }
  .detail-tag { font-size: 10px; padding: 2px 7px; border-radius: 100px; border: 0.5px solid var(--color-border-tertiary); color: var(--color-text-secondary); background: var(--color-background-secondary); }
  .detail-tag.spell { background: var(--color-background-info); color: var(--color-text-info); border-color: var(--color-border-info); }
  .detail-tag.monster { background: var(--color-background-warning); color: var(--color-text-warning); border-color: var(--color-border-warning); }
  .detail-tag.skill { background: var(--color-background-success); color: var(--color-text-success); border-color: var(--color-border-success); }
  .detail-incant { font-size: 12px; color: var(--color-text-info); font-style: italic; margin-bottom: 8px; padding: 6px 10px; background: var(--color-background-info); border-radius: 4px; border: 0.5px solid var(--color-border-info); line-height: 1.5; }
  .detail-desc { font-size: 12px; color: var(--color-text-secondary); line-height: 1.65; }
  .detail-empty { font-size: 13px; color: var(--color-text-tertiary); font-style: italic; text-align: center; padding: 2rem 0; }
  /* Summary entries with descriptions */
  .summary-tags { flex-direction: column; gap: 8px; }
  .sum-entry { border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-md); padding: 9px 12px; background: var(--color-background-secondary); }
  .sum-entry.is-spell { border-color: var(--color-border-info); background: var(--color-background-info); }
  .sum-entry.is-monster { border-color: var(--color-border-warning); background: var(--color-background-warning); }
  .sum-entry.is-skill { border-color: var(--color-border-success); background: var(--color-background-success); }
  .sum-entry-header { display: flex; justify-content: space-between; align-items: baseline; gap: 8px; margin-bottom: 4px; }
  .sum-entry-name { font-size: 13px; font-weight: 600; }
  .sum-entry.is-spell .sum-entry-name { color: var(--color-text-info); }
  .sum-entry.is-monster .sum-entry-name { color: var(--color-text-warning); }
  .sum-entry.is-skill .sum-entry-name { color: var(--color-text-success); }
  .sum-entry-type { font-size: 9px; text-transform: uppercase; letter-spacing: 0.8px; color: var(--color-text-tertiary); white-space: nowrap; flex-shrink: 0; }
  .sum-entry-call { font-size: 11px; font-style: italic; color: var(--color-text-info); margin: 3px 0 4px; padding: 4px 8px; background: rgba(0,0,0,0.06); border-radius: 3px; border-left: 2px solid var(--color-border-info); line-height: 1.4; }
  .sum-entry.is-monster .sum-entry-call { border-left-color: var(--color-border-warning); }
  .sum-entry.is-skill .sum-entry-call { border-left-color: var(--color-border-success); }
  .sum-entry-desc { font-size: 11px; color: var(--color-text-secondary); line-height: 1.6; }
  @media (max-width: 680px) {
    .main-layout { grid-template-columns: 1fr; }
    .monster-inputs { grid-template-columns: 1fr 1fr; }
    .monster-inputs .field-group:first-child { grid-column: 1 / -1; }
    .monster-inputs .field-group:nth-child(2),
    .monster-inputs .field-group:nth-child(3),
    .monster-inputs .field-group:nth-child(4) { grid-column: auto; }
  }
  @media print {
    body > * { display: none !important; }
    #print-area { display: block !important; }
  }
  #print-area { display: none; }
</style>
</head>
<body>
<div class="app">
  <div class="app-header">
    <div class="app-title">&#9876; UW Monster Builder</div>
    <div class="app-subtitle">Underworld LARP &middot; NPC / Creature Design Tool</div>
  </div>
  <div class="panel">
    <div class="panel-header"><span class="panel-title">Monster Profile</span></div>
    <div class="panel-body">
      <div class="monster-inputs">
        <div class="field-group">
          <label class="field-label">Monster Type</label>
          <input class="field-input" id="inp-type" type="text" placeholder="e.g. Skeleton Warrior, Cave Troll&hellip;" oninput="updateSummary()">
        </div>
        <div class="field-group">
          <label class="field-label">Body</label>
          <input class="field-input" id="inp-body" type="number" min="0" placeholder="0" oninput="updateSummary()">
        </div>
        <div class="field-group">
          <label class="field-label">AP (Armour Points)</label>
          <input class="field-input" id="inp-ap" type="number" min="0" placeholder="0" oninput="updateSummary()">
        </div>
        <div class="field-group">
          <label class="field-label">Damage</label>
          <input class="field-input" id="inp-damage" type="text" placeholder="e.g. 5 Normal" oninput="updateSummary()">
        </div>
      </div>
    </div>
  </div>
  <div class="panel">
    <div class="panel-header">
      <span class="panel-title">Monster Summary</span>
      <button class="print-btn" onclick="printMonster()">&#128424; Print</button>
    </div>
    <div class="summary-meta">
      <div class="meta-item"><span class="meta-label">Type</span><span class="meta-value" id="sum-type" style="color:var(--color-text-tertiary);font-style:italic;font-size:13px;font-weight:400">&mdash;</span></div>
      <div class="meta-item"><span class="meta-label">Body</span><span class="meta-value" id="sum-body">&mdash;</span></div>
      <div class="meta-item"><span class="meta-label">AP</span><span class="meta-value" id="sum-ap">&mdash;</span></div>
      <div class="meta-item"><span class="meta-label">Damage</span><span class="meta-value" id="sum-damage">&mdash;</span></div>
    </div>
    <div class="summary-tags" id="summary-tags">
      <span class="summary-empty-note">No skills, spells, or abilities added yet.</span>
    </div>
  </div>
  <div class="main-layout">
    <div>
      <div class="panel">
        <div class="panel-header"><span class="panel-title">Skills, Spells &amp; Monster Abilities</span></div>
        <div class="panel-body">
          <div class="rows-container" id="rows-container"></div>
          <button class="add-row-btn" onclick="addRow()">&#65291; Add Skill / Spell / Ability</button>
        </div>
      </div>
    </div>
    <div>
      <div class="detail-panel" id="detail-panel">
        <div class="detail-empty">Hover a dropdown item to see details</div>
      </div>
    </div>
  </div>
</div>
<div id="print-area"></div>
<script>

const MONSTER_ABILITIES = [
  {name:"Absorb <Effect>",cat:"Monster Ability",
   call:"Absorb <Effect>",
   delivery:"N/A",
   desc:"The monster can absorb an effect at range and suffer no ill effects from it. The effect must pass within, or occur within, 10 feet of the monster using this skill, such as a thrown packet or weapon swing. Once absorbed the monster may be able to do other abilities with the absorbed effect such as use the abilities \"Heal From\" or \"Ricochet\". If it can use neither, the effect is simply negated. \"Absorb Magic\" affects both Battle Magic and Ritual Magic-level effects, while \"Absorb Arcane\" affects all levels of magic."},
  {name:"Acidic Blood",cat:"Monster Ability",
   call:"Acidic Blood (After the first Body damaging weapon strike against it by each individual attacker, once each)",
   delivery:"N/A",
   desc:"Metal weapons which successfully do Body damage to the monster take an \"Alchemical Shatter\" effect (see \"Shatter\" below) after 1 minute. If after combat the weapon used can be proven via its tag to a Shaper to not be made of metal, it is unaffected (use discretion)."},
  {name:"Age <X>",cat:"Monster Ability",
   call:"Weapon Swing (Carrier Effect): \"10 Magic Body Age 2\" OR Packet Delivered: \"Magic Age 10\"",
   delivery:"Weapon Swing (Carrier Effect), Packet Delivered (Magic)",
   desc:"An effect which ages the target by X years each time it occurs. Usually reserved for Spirits or Undead that can drain away one's lifeforce."},
  {name:"Alien Anatomy",cat:"Monster Ability",
   call:"No Effect",
   delivery:"N/A",
   desc:"The monster has a strange physiology that is aberrant or atypical of most natural vertebrates. It is immune to effects that target vital organs, the head or eyes, or requires knowledge of Anatomy, such as Decapitate, Sap, Head-Butt, Dirt in the Eye, Vital Blow, Execute, First Aid, etc.) unless an exception is stated in the monster's statistics (such as insects and arachnids in the \"Vermin\" section). It would state \"No Effect\" to any such effect. However, it is not immune to having its limbs broken or severed, such as with Fracture or Dismember."},
  {name:"Amphibious",cat:"Monster Ability",
   call:"Sinking Below on a 3-count",
   delivery:"N/A",
   desc:"This monster is at home on land or in the water. It can breathe underwater or hold its breath for a limited or unlimited amount of time, as indicated in the monster's statistics. If in sufficiently deep water, it may sink below the water with a 3-count, \"Sinking Below 1, Sinking Below 2, Sinking Below 3\". A creature below the water can't be attacked by anything above the water, and vice versa."},
  {name:"Aquatic",cat:"Monster Ability",
   call:"Sinking Below on a 3-count",
   delivery:"N/A",
   desc:"This monster can only exist in water. If it leaves the water for 1 minute, it begins to suffocate, entering its Death Count after another minute. While in water, the monster has the Free Action ability, but outside of water it is under a Swampwalk effect. If in sufficiently deep water, it may sink below the water with a 3-count, \"Sinking Below 1, Sinking Below 2, Sinking Below 3\". A creature below the water can't be attacked by anything above the water, and vice versa."},
  {name:"Bite",cat:"Monster Ability",
   call:"\"10 Body Bite\" OR \"2 Magic Body Nausea Bite\"",
   delivery:"Weapon Swing",
   desc:"This physical attack suffix is used with two claw reps which represent a jaw or mouth. Both claws must hit the target simultaneously for the bite to be successful, and is negated if at least one boffer is blocked. Bites do \"Body\" damage to the target and can be combined with other abilities (see \"Carrier Effect\" below) as shown on the stat block."},
  {name:"Blink",cat:"Monster Ability",
   call:"\"Blink!\" OR \"Blink <Number>!\"",
   delivery:"N/A",
   desc:"This ability allows the monster to instantly teleport short distances. It is typically done by using two or more NPCs who are dressed identically, only one of which is In-Game at any time. The In-Game NPC may call \"Blink!\" or \"Blink <Number>!\" which causes the other NPC or NPC who has been given a number to appear In-Game in a different location, replacing the NPC who made the call. Only 1 NPC should be in-game at any given time."},
  {name:"Breach Armour",cat:"Monster Ability",
   call:"Weapon Swing: \"Physical Breach Armour\" OR Packet Delivered: \"Alchemical Breach Armour\"",
   delivery:"Weapon Swing, Packet Delivered (Alchemical, Magic, Physical)",
   desc:"This attack causes the target's armour (if any) to instantly be reduced to 0 Armour Points and be considered breached. This attack will breach any type of armour, including legendary armour."},
  {name:"Burn",cat:"Monster Ability",
   call:"Elemental Burn",
   delivery:"Weapon Swing, Packet Delivered (Elemental)",
   desc:"Burn is an Elemental attack that will light the target on fire. The target takes \"1 Elemental Fire\" per second until they drop to the ground and roll around on a 10-count to snuff out the fire. The target being fully submerged in water will immediately put out the flames as well. If the target is immune to Elemental Fire or uses defences against Elemental Fire damage (such as Elemental Shield) then Burn will fail."},
  {name:"Burrow",cat:"Monster Ability",
   call:"\"Burrowing 1, Burrowing 2, Burrowing 3\"",
   delivery:"N/A",
   desc:"This ability allows the monster to burrow and travel underground. Burrow may be done on a 3-count, \"Burrowing 1, Burrowing 2, Burrowing 3\". During this count the monster may still be attacked, however this does not interrupt the count. Once burrowed the monster goes Out-of-Game and may move by tunneling. While moving underground the monster must inform others with the Out-of-Game sensation: \"You feel rumbling under the ground\". The monster may remain burrowed for up to 10 seconds."},
  {name:"Burst Forth",cat:"Monster Ability",
   call:"Burst Forth",
   delivery:"N/A",
   desc:"This ability is always paired with an ability that grants an Out-of-Game or altered state (Burrow, <Realm> Walking, Fly, Gaseous Form, sinking below water with Amphibious/Aquatic, etc.). Upon using this ability, the monster emerges from or ends that state."},
  {name:"Carrier Effect",cat:"Monster Ability",
   call:"\"5 Magic Bind\" OR \"2 Normal Weakness\" OR \"10 Magic Nausea\"",
   delivery:"Weapon Swing (Carrier Effect)",
   desc:"These are physical weapon attacks that have additional effects/abilities that are added as suffix modifiers. The original attack must be successful and strike the target to Body in order for the Carrier Effect to apply."},
  {name:"Chronomancy: Time Rewind",cat:"Monster Ability",
   call:"Arcane Time Rewind",
   delivery:"N/A",
   desc:"This extremely powerful ability allows a monster to manipulate time. Time Rewind: The monster reverses its own timeline to defend against any effect or instance of damage. Alternatively, when it misses with one of its abilities, or that ability is defended against, it can reverse its own timeline to regain the use of that ability."},
  {name:"Chronomancy: Time Stop",cat:"Monster Ability",
   call:"Arcane Time Stop OR Spellstrike Arcane Time Stop",
   delivery:"Packet Delivered (Arcane), Spellstrike (Arcane)",
   desc:"This extremely powerful ability allows a monster to manipulate time. Time Stop: The monster freezes a creature in time. This acts as an Arcane Paralysis effect that can affect all creatures regardless of any immunity to Mind Altering Effects, and additionally pauses all counts on the target for its 10 minute duration. The monster can choose to touch the target and state \"Arcane Time Start\" to end the effect early if they desire."},
  {name:"Consume Corpse",cat:"Monster Ability",
   call:"\"Consuming Corpse\" on a 30-count",
   delivery:"N/A",
   desc:"This effect has the monster roleplay eating part of the target for the duration of the count while they are in their Bleed or Death Count. After that time, the target is automatically killing blowed if they were in their Bleed Count, and the monster receives Mending to their full amount of Body Points. If the monster is interrupted in its count it must restart from the beginning. Once a target has been successfully affected by Consume Corpse, they can't be the target of it again until they regain at least 1 Body Point."},
  {name:"Cower",cat:"Monster Ability",
   call:"Weapon Swing (Carrier Effect): \"2 Magic Cower\" OR Packet Delivered: \"Magic Cower\"",
   delivery:"Weapon Swing (Carrier Effect), Packet Delivered (Magic)",
   desc:"A Fear Effect which causes the target struck to hide from the attacker. The target must attempt to flee and cower behind any large physical object (cannot be a creature) for 10 seconds before they regain their nerve. If no such object exists, they will simply flee to the best of their ability until they can find a suitable object, but for no longer than 30 seconds. If the target finds an object to cower behind they may use skills and abilities like normal while the 10 second timer activates. The target cannot attack the monster that affected them with Cower until the effect is removed or ends. If the target becomes cornered in a way that they cannot escape and are attacked by the source of the Cower, the effect will immediately end."},
  {name:"Create Replica",cat:"Monster Ability",
   call:"Create Replica",
   delivery:"N/A",
   desc:"This monster is able to create one or more illusionary-style duplicates of itself, typically played by other NPCs who appear identical to the original monster. These likenesses are invulnerable to all attacks and effects (stating No Effect), but are limited to using only 1 physical weapon strike or monster ability per 10 seconds themselves. No Replica may exist for more than 60 seconds but the monster may be able to spawn more of them. A monster is limited in how many Replicas they may create within a given amount of time (Ex. 2x/Minute, or 3x/10 Minutes, etc.) A monster with Replica and Blink (see Blink above) can use Blink to seamlessly change places with one of its duplicates."},
  {name:"Crush <X Massive>",cat:"Monster Ability",
   call:"\"Crushing\" on a 3-count then \"X Massive\"",
   delivery:"N/A",
   desc:"Always paired with the Grab ability (see Grab below). The monster has means to squeeze targets it has grabbed with force. While the target is held in the grab, the monster can begin crushing it on an at will 3-count, \"Crushing 1, Crushing 2, Crushing 3\". If the target is not freed from the grab before the end of the count, it takes \"X Massive\"."},
  {name:"Curse of Arrhythmia",cat:"Monster Ability",
   call:"Packet Delivered: \"Magic Lesser Curse of Arrhythmia\" OR Spellstrike: \"Spellstrike Greater Curse of Arrhythmia\"",
   delivery:"Packet Delivered (Magic), Spellstrike",
   desc:"This curse causes the target to reply to all Sense calls by yelling instead of a normal speaking voice. It can be either a Lesser or Greater Curse with the Lesser version lasting 1 hour and the Greater version following the Core Rulebook definition, lasting until removed."},
  {name:"Curse of Destruction",cat:"Monster Ability",
   call:"Packet Delivered: \"Magic Lesser Curse of Destruction\" OR Spellstrike: \"Spellstrike Greater Curse of Destruction\"",
   delivery:"Packet Delivered (Magic), Spellstrike",
   desc:"This curse causes the target to take x2 numerical damage from all sources. It can be either a Lesser or Greater Curse with the Lesser version lasting 1 hour and the Greater version following the Core Rulebook definition, lasting until removed."},
  {name:"Destroy <X> Armour",cat:"Monster Ability",
   call:"Weapon Swing: \"Physical Destroy 10 Armour\" OR Packet Delivered: \"Alchemical Destroy 10 Legendary Armour\"",
   delivery:"Weapon Swing, Packet Delivered (Alchemical, Magic)",
   desc:"If struck, the Armour Points of the target takes the X amount of damage and if the armour breaches the damage done is permanent (Ex. If the target has 50 Armour Points total and their armour is breached via Destroy 20 Armour, then 20 points worth of their armour tags will be permanently destroyed, rounded down). This effect will not do damage to Body Points or harm the armour's wearer in any way. This has no effect on legendary armour unless the rare prefix \"Legendary\" is used with this ability. If a target is breached by this rare type of Destroy Armour, the number of Armour Points destroyed is taken from any legendary armour they are wearing first before regular armour."},
  {name:"Directed Attack",cat:"Monster Ability",
   call:"\"Directed Attack 1, Directed Attack 2...\" then \"Directed Attack Physical 10 Massive\" OR \"Directed Attack Magic Death\"",
   delivery:"N/A",
   desc:"This special attack requires the monster to point at the target, stop moving and perform a 10-count loudly, \"Directed Attack 1, Directed Attack 2, Directed Attack 3, etc\". After the 10-count if the target is still in view of the monster, it states the complete Directed Attack call, and the target takes the effect. If the monster moves or cannot see, this ability is considered interrupted. Note: The monster may specify the target Out-of-Game at the end of the complete call for clarification if needed."},
  {name:"Disarm",cat:"Monster Ability",
   call:"Weapon Swing: \"Physical Disarm\" OR Packet Delivered: \"Physical Disarm <Object to be Dropped>\"",
   delivery:"Weapon Swing, Packet Delivered (Physical)",
   desc:"This physical ability causes the target to drop what is in their hand. If struck by a physical weapon swing on the target's limb, weapon, or shield, the target must drop whatever is in the corresponding hand. If the weapon strikes anywhere else (such as the torso or leg) it has no effect. If the Disarm is packet delivered, it may hit the target anywhere, as the object to be dropped is specified in the call. If the object is omitted from the packet delivered call, the target is free to choose to drop an object from either hand. The dropped item may immediately be picked up again if desired."},
  {name:"Dominate",cat:"Monster Ability",
   call:"\"Magic Dominate\"",
   delivery:"Packet Delivered (Alchemical, Magic)",
   desc:"This Charm Effect will cause the target to follow the orders of the monster. They cannot be commanded to harm themselves in any way, but can be ordered to attack other targets. The duration is 10 minutes."},
  {name:"Drain",cat:"Monster Ability",
   call:"\"1 Magic Body Drain\" OR \"20 Massive Drain\"",
   delivery:"N/A (Special Damage Suffix)",
   desc:"A damage suffix that always follows a damage type that hits directly to Body. This effect both damages the target and applies the Body damage to the monster in the form of Mending. Additionally, any Mending that exceeds the monster's maximum Body points grants them temporary Body points equal to the excess. Temporary Body points gained from this ability last 1 hour, but don't stack."},
  {name:"Echo",cat:"Monster Ability",
   call:"Echo",
   delivery:"N/A",
   desc:"If a target successfully uses a defence against a magical effect originating from the monster, the monster can Echo it. This causes the target to be instantly hit by the effect again. The target may still call another defence if they have one. This can be used on every magical effect the monster has, unless otherwise stated."},
  {name:"Elemental Form: <Element>",cat:"Monster Ability",
   call:"(Passive — listed in Monster Features and Vulnerabilities)",
   delivery:"N/A",
   desc:"Monsters with this ability are typically from the Elemental Planes. They have the following attributes: x4 damage from the opposing Element (Fire opposes Water/Ice, Earth/Stone opposes Air/Lightning, Life/Healing opposes Death/Infliction); Heals from its own Element if Packet Delivered or via Spellstrike; Immune to its own Element if struck by a physical weapon strike; Immune to all effects that target a physical body or its nervous system, including its limbs, vital organs, and method of breathing, such as Garrotte, Paralysis, Sap, Hamstring, Head-Butt, Dirt in the Eye, Sucker Punch, Stun, Decapitate, Dismember, Execute, etc.; Immune to all Alchemy/Chemistry, including Acid damage; Immune to Disease; Can't be knocked unconscious, including by Sleep effects; Any effect that banishes an Elemental will send the monster back to the Elemental Plane its Element is tied to for a year and a day."},
  {name:"Engulf",cat:"Monster Ability",
   call:"Physical Engulf",
   delivery:"Weapon Swing",
   desc:"This attack is used with two claw reps, and causes a target to be pulled into the monster. If the claw reps strike the target or anything they are holding, they are swallowed whole. Once swallowed, the target stands beside the monster Out-of-Game, and any damage done to the monster will also damage the target (if it would damage them normally). While inside the monster, the target is considered completely immobilized and cannot act in any way. After being inside the monster for 1 minute, they will suffocate and enter their Death Count. Targets that do not need to breathe are immune to this suffocation. If the monster is reduced to 0 Body Points, targets who are still conscious can emerge from it on a 3-count, otherwise they must be cut from the monster's stomach on a 5-count with an edged weapon. Monsters with this ability may only engulf one target at a time, unless otherwise noted. If a target uses an effect that would reflect the Engulf in any way, it just defends against the Engulf; the monster is not engulfed by the target."},
  {name:"Explosive Death <X Feet, Effect>",cat:"Monster Ability",
   call:"\"Explosive Death: 10 Feet, 5 Acid\" OR \"Explosive Death: 10 Feet, Innate Magic Sleep\"",
   delivery:"N/A",
   desc:"3 seconds after the monster with this ability enters its Bleed Count, it explodes in a X foot radius, causing all targets in the area to take an effect (usually damage). The damage or other effect is listed in the monster's statistics."},
  {name:"Extraplanar Being: <Realm>",cat:"Monster Ability",
   call:"(Passive — no call)",
   delivery:"N/A",
   desc:"The monster has no Bleed or Death Count and as such cannot be Spirit Severed. When it reaches 0 Body Points on a realm that isn't its native plane, it doesn't take a death, and instead returns to its own realm. If it is killed on its native plane, it takes a death as normal."},
  {name:"Fae Mark",cat:"Monster Ability",
   call:"Arcane Light/Dark Fae Mark (via touch or esoteric means)",
   delivery:"Unique",
   desc:"A Fae Mark is similar to a unique magical tattoo (though depending on the True Fae, this mark may be invisible) that is placed upon a target with a spirit by a True Fae via touch or other more esoteric means. A Light Fae Mark indicates to other True Fae that the target is a friend to the granter of the mark, and functions as a Moonlight Mantle spell (which refreshes at the start of each game). A Dark Fae Mark indicates to other True Fae that the target is an enemy to the granter of the mark, and functions as a Lesser Curse of Destruction (which lasts as long as the Fae Mark does). Both types last until resurrection, although the same True Fae can remove their Fae Mark if they desire without effort. Additionally, a higher ranking True Fae of the same court or affiliation as the granter of the mark can also remove it. Note: Despite a Dark Fae Mark conferring the effect of a curse, Fae Marks are not curses and can't be affected by effects that remove a curse, nor can the Lesser Curse of Destruction effect be cured before the Fae Mark is removed."},
  {name:"Feed On <Target>",cat:"Monster Ability",
   call:"\"Feeding On <Target>\" on a 5-count",
   delivery:"N/A",
   desc:"This ability comes in a variety of forms and can be used on either a type of object or a creature. If used on a creature, it must be willing or helpless. To use this ability the monster performs a 5-count, \"Feeding On <Target> 1, Feeding On <Target> 2, etc\". If the count is successful, the object is destroyed or the creature enters their Death Count. Some monsters gain beneficial effects from \"Feed On\" such as Mending or resetting of skills, but this will be indicated in its statistics, usually as a Special ability (see \"Special\" below). Monsters which have \"Feed On Magic\" are capable of destroying magic items such as Battle Magic or Ritual scrolls, magical weapons, enchanted items, etc."},
  {name:"Flesh to Stone",cat:"Monster Ability",
   call:"Weapon Swing: \"5 Normal Flesh to Stone\" OR Packet Delivered: \"Magic Flesh to Stone\"",
   delivery:"Weapon Swing (Carrier Effect), Packet Delivered (Alchemical, Magic)",
   desc:"This ability turns the target into a stone (or sometimes other solid material) statue. For the duration of the effect, the target is immune to all physical effects (be they weapon swings or \"Physical\" prefix packet delivered attacks), excluding weapons that swing \"Magic\" damage (or equivalent), and anything that would cause them to age. They are also immune to all non-Ritual magic sources of forced movement. While the spell is in effect, the target may not move, see, speak, or use any skills. All spells and weapons that swing \"Magic\" damage as referenced above will affect them as normal. This effect lasts 1 hour (because roleplaying a statue is boring for a player), but may last longer at Shaper discretion for plotline reasons. It may only be reversed by Dispel Magic effects. If the target dies while petrified in this manner, they will revert to their normal form when they enter their Death Count."},
  {name:"Fly",cat:"Monster Ability",
   call:"\"Flying up\" on a 3-count OR \"Flying down\" on a 3-count",
   delivery:"N/A",
   desc:"A monster with this ability can fly up into the air. Doing so requires a 3-count to fly up or down, \"Flying up 1, etc.\" or \"Flying down 1, etc.\" While this ability is active, the monster is too high up and cannot be the target of any attacks, spells or abilities, save for arrows, crossbow bolts, Power Words, or Directed Attacks (see \"Directed Attack\" above). The creature may still use abilities while flying. Typically found on monsters with wings."},
  {name:"Free Action",cat:"Monster Ability",
   call:"No Effect",
   delivery:"N/A",
   desc:"This passive ability makes the monster immune to any binding effect that would physically constrict it, any effect that would stun it, and any effect that would slow its movement in any manner that is not a Mind Altering Effect or being knocked unconscious. This includes effects, such as Stun, Swampwalk, Snare, Bind, Web, Black Plague, Tread Water, etc., but not effects like Sap or Repel. It would state \"No Effect\" to any such effect."},
  {name:"Frostbite",cat:"Monster Ability",
   call:"Elemental Frostbite",
   delivery:"Weapon Swing, Packet Delivered (Elemental)",
   desc:"Frostbite is an Elemental attack which causes the target's hands to become unbearably cold. If successful, both hands are disarmed for 5 minutes, during which time they may not hold items including weapons, and may not cast any spells or use them in any way. If the target roleplays warming their hands for 1 minute continuously they regain the use of their hands and are no longer disarmed. If the target is immune to Elemental Ice or uses defences against Elemental Ice damage (such as Elemental Shield) then Frostbite will fail."},
  {name:"Gaseous Form",cat:"Monster Ability",
   call:"\"Gaseous Form 1, Gaseous Form 2, Gaseous Form 3\"",
   delivery:"N/A",
   desc:"With this ability the monster may turn its physical body into mist or smoke (or back to its normal form) on a 3-count, \"Gaseous Form 1, Gaseous Form 2, Gaseous Form 3\". All clothing and possessions also change with it. While in this form, it is immune to attacks and damage of all kinds. It cannot manipulate physical objects, use other abilities (including casting magic), or do anything more than move at a walking pace. However, while in this form the monster can now pass through very small openings such as keyholes. It can see and hear while in Gaseous Form but cannot speak."},
  {name:"Gaze Attack",cat:"Monster Ability",
   call:"\"Magic Gaze Dominate\" OR \"Magic Gaze Death\"",
   delivery:"N/A",
   desc:"This special attack requires the monster to meet the target's gaze for 10 seconds continuously. The monster does not have to count these seconds out loud. After 10 seconds, the target takes the called effect. This is a magical effect that can be defended against with an appropriate spell or ability, but not with a Dodge. It can be used through barriers of any kind so long as eye contact is possible. Rarely, some monsters may possess Arcane Gaze Attacks."},
  {name:"Gore",cat:"Monster Ability",
   call:"\"Prepare to Gore 1, Prepare to Gore 2, Prepare to Gore 3\" then \"Physical Gore 25 Normal\"",
   delivery:"N/A",
   desc:"The monster prepares to Gore with a 3-count, \"Prepare to Gore 1, Prepare to Gore 2, Prepare to Gore 3\", sometimes stomping its feet as well. It then charges at a target and swings once for greater damage than its usual physical weapon strikes, typically 25 or 50 damage, as per the monster's statistics. If the monster misses the attack, the ability is considered used."},
  {name:"Grab",cat:"Monster Ability",
   call:"Physical Grab <X> Strength",
   delivery:"Weapon Swing",
   desc:"Grab is a physical attack that uses the monster's Strength bonus. The monster must touch its target with one or both claw reps on either a limb or the torso (depending on the monster's statistics) and state Grab's call, where X is their Strength bonus. Once hit, that limb is completely immobile and can't be pulled from the monster's grasp. If the torso is hit then the target is immobilised from the neck down. In either case the target cannot move away from the monster until the Grab is broken. To do so the target must declare their Strength bonus and, if it is greater than the monster's Strength, they can pull free of the Grab with no other ill effects. Other characters may combine their Strength bonuses to pull the target away from the Grab if that total Strength is higher than the monster's Strength. When a monster has a target grabbed it may have additional abilities it can use on the target, such as the Crush ability (see \"Crush\" above). If the monster chooses to remove its claw rep from the target to defend itself or take other actions, the target is free of the Grab and may act normally. Note: Some extremely physically strong monsters can use \"Massive Physical Grab\" to take hold of a creature whether it blocks the claw reps or not."},
  {name:"Heals From: <Effect>",cat:"Monster Ability",
   call:"Heals From (stated each time the monster is hit with such effects)",
   delivery:"N/A",
   desc:"The monster Mends from taking a certain damage of type or effect, such as Infliction or Elemental Fire damage. It states the call each time it is hit with such effects."},
  {name:"Hivemind: <Death or No Effect>",cat:"Monster Ability",
   call:"(Passive — listed in Monster Features and Vulnerabilities)",
   delivery:"N/A",
   desc:"The monster is connected to and controlled by a Hivemind. They will either take a Death effect or call \"No Effect\" if hit by a Charm Effect or Mind Altering Effect, depending on the monster type. This will be indicated in the monster's statistics. This is usually listed in the \"Monster Features and Vulnerabilities\" section of a stat block."},
  {name:"Immunity: <Type>",cat:"Monster Ability",
   call:"No Effect",
   delivery:"N/A",
   desc:"The monster is immune to the specified type of damage, effect, or Sphere of Magic. They must say \"No Effect\" when hit with effects of that type (Ex. \"Immunity: Nature\" or \"Immunity: Effects that Target the Head or Limbs\"). If an immunity lists an element, such as just \"Fire\", the monster has immunity to both Magic and Elemental Fire attacks. This is usually listed in the \"Monster Features and Vulnerabilities\" section of a stat block."},
  {name:"Infest",cat:"Monster Ability",
   call:"\"Infesting\" on a 10-count",
   delivery:"N/A",
   desc:"The monster physically implants an egg within a living or dead host, typically within the chest cavity, which requires a 10-count, \"Infesting 1, Infesting 2\", etc. The new creature will burst out of the target after a time determined by a Shaper or stated in the monster's statistics (usually as a Special ability), causing the host to enter its Death Count (if living)."},
  {name:"Instant",cat:"Monster Ability",
   call:"\"Instant Burrow\" OR \"Instant Gaseous Form\"",
   delivery:"N/A",
   desc:"This ability is always paired with an ability that grants an Out-of-Game or altered state (Burrow, <Realm> Walking, Fly, Gaseous Form, etc.). This rare and taxing skill allows a monster to instantly use the ability it is attached to without a count to enter that state (not exit it; see \"Burst Forth\" above). It can never be used at will, and will always have some form of usage per time description."},
  {name:"Juggernaut",cat:"Monster Ability",
   call:"Juggernaut",
   delivery:"N/A",
   desc:"This monster cannot be instantly put into its Bleed or Death Count due to its size or extreme strength. Additionally, it can't be incapacitated, immobilised, take any abilities that target or sever external body parts or vital organs, or be rendered helpless. If Juggernaut negates any of the above, its call should be stated in a loud voice. This ability is typically added to monsters who are intended to be \"boss fights\" and thus make them last a fair amount of time in combat."},
  {name:"Limb Break",cat:"Monster Ability",
   call:"Physical Limb Break",
   delivery:"Weapon Swing",
   desc:"This physical ability causes a limb to break, becoming useless. The limb must be struck by the physical weapon swing, and if blocked is considered used. The broken limb may be used for nothing, not even locomotion. On basic bipedal creatures, arms or legs count as limbs, although pincers, tentacles etc. qualify as limbs on many other creatures. The broken limb may be fixed with effects that restore limbs."},
  {name:"Minimize",cat:"Monster Ability",
   call:"Minimize",
   delivery:"N/A",
   desc:"This defensive ability reduces numeric damage dealt by a single source to only 1 point of damage no matter how much damage was done, assuming that damage breaches any Thresholds or defences. This will minimize all damage types (excluding racial vulnerabilities) unless otherwise stated. The monster must state \"Minimize\" when first hit with these effects (subsequent hits of the same damage type from the same source do not need to be repeated). Numeric attacks with Carrier Effects will have those effects still apply, and effects without numeric damage will function normally."},
  {name:"Nausea",cat:"Monster Ability",
   call:"Weapon Swing: \"8 Magic Nausea\" OR Packet Delivered: \"Alchemical Nausea\"",
   delivery:"Weapon Swing (Carrier Effect), Packet Delivered (Alchemical)",
   desc:"This attack counts as a Disease. The target is overwhelmed by nausea and cannot run or use tagged skills (including casting spells from memory, but not from magic items). The duration is 10 minutes. It can be removed by any means that removes a Disease from the target. The target may end their nausea by roleplaying vomiting for a continuous 10-count."},
  {name:"No Back",cat:"Monster Ability",
   call:"No Effect — No Back",
   delivery:"N/A",
   desc:"This monster has no discernable back, such as a Manifestation, Ooze, or some Elementals. If hit by an attack that requires the monster to have a back, such as physical weapon swings using the Critical skill, it states \"No Effect - No Back\" to indicate its lack of one."},
  {name:"No Corpse",cat:"Monster Ability",
   call:"(Passive — no call)",
   delivery:"N/A",
   desc:"This monster does not leave a corpse behind when it dies, having no Bleed or Death Count. This may be an Undead creature that turns to dust, an Elemental that is banished back to the Elemental Plane from whence it came, and so on. When this monster dies, it Out-of-Game places its loot on the ground (should it have any) and dissipates. Monsters with this ability and Extraplanar Form have a Bleed and Death Count on its native plane, and may leave a corpse behind when killed on such a plane at Shaper discretion."},
  {name:"No Metabolism",cat:"Monster Ability",
   call:"No Effect",
   delivery:"N/A",
   desc:"This monster has no metabolism and doesn't need to breathe, such as an ooze or golem. It is also immune to Disease, all Alchemy/Chemistry, with the exception of Acid damage, Sticky Paste, Rusting Dust, and any Alchemy/Chemistry that can be applied to a weapon to increase its damage. Additionally, it can't be affected by any ability that targets vital organs, or requires knowledge of Anatomy, such as Sap, Head-Butt, Dirt in the Eye, Vital Blow, Execute, First Aid, Disembowel, etc. It would state \"No Effect\" to any such effect."},
  {name:"Non-Corporeal",cat:"Monster Ability",
   call:"\"Phasing through wall 1, phasing through wall 2, phasing through wall 3\"",
   delivery:"N/A",
   desc:"This monster is non-corporeal, such as a Ghost or ethereal Undead. It has the following attributes: It may move through all corporeal objects and barriers (including magical ones of Ritual-level or below; but not Vaults) on a 3-count, \"Phasing through wall 1, phasing through wall 2, phasing through wall 3\"; It has the Free Action ability, including immunity to being stunned; Immune to all Alchemy/Chemistry, including Acid damage, as it has no physical form to melt; Immune to Disease; Immune to being blinded by non-magical means; Can only be affected by spells or physical weapon attacks that deal \"Magic\" damage (or equivalent), while anything with the \"Physical\" prefix will fail. It also cannot be physically moved; Immune to all attacks which target or sever external body parts or vital organs such as Hamstring, Dismember, Decapitate, Disembowel, Vital Blow, Execute, etc., as it has no physical form to target."},
  {name:"No Spirit",cat:"Monster Ability",
   call:"No Effect (to non-Elemental damaging magic)",
   delivery:"N/A",
   desc:"This monster has no spirit; it has been animated by some magic or outside force. It cannot be targeted by any further magic except spells or magical effects that do Elemental damage. Any other effects that require a spirit to work will fail. However, this doesn't allow the monster to walk through magical barriers, such as a Circle of Protection. A \"No Effect\" call should be used if struck by non-Elemental damaging magic. This monster has no Bleed or Death Count and will be considered destroyed or dead when it reaches 0 Body Points."},
  {name:"Obliterate",cat:"Monster Ability",
   call:"Arcane Obliterate",
   delivery:"Packet Delivered (Arcane)",
   desc:"This powerful ability is one of the most feared to any mortal. It will instantly kill them and sever their spirit so they cannot receive a Life effect, immediately sending them to go resurrect (if able). Furthermore, the attack so weakens their spirit that when attempting to resurrect, the death will count as 2 deaths, and the target may need to flip for Final Death twice should they have no free deaths remaining. It is considered an Arcane-level attack unless otherwise stated."},
  {name:"Phase",cat:"Monster Ability",
   call:"Phase",
   delivery:"N/A",
   desc:"This powerful defensive ability allows the monster to negate any attack or effect that isn't a Surprise attack, as its body briefly flickers out of existence. This will work on Area of Effects, Traps, Gaze Attacks, Power Words, and Arcane abilities unlike the Dodge skill, because the monster vanishes from reality then immediately reappears."},
  {name:"Possession",cat:"Monster Ability",
   call:"\"Possessing\" on a 5-count",
   delivery:"N/A",
   desc:"The monster can possess creatures with Mysticism by touch on an at will 5-count, \"Possessing 1, Possessing 2, etc\". Only creatures with Mysticism can interrupt the possession, but it can't be interrupted by a creature incapable of moving, such as one who is unconscious, or under the effect of Sleep, Paralysis, Web etc. The monster can end any effect that is causing its host to be incapable of moving when it successfully possesses it. Possessed creatures are controlled by the monster until it releases them by stating \"Release\", or either the monster or creature it is possessing drops to 0 Body Points, which ejects the monster from the creature's body. If the creature is using the Mysticism skill Manifest, it can't interrupt the monster trying to possess their body. If their body is possessed in this way, they immediately become an incorporeal spirit that must follow their body, while their body is controlled by the monster. In this special state, as the body is still in its Death Count, the monster uses its Body Points instead of its host's Body Points. This lasts until the monster releases the target, the body is hit by an Exorcism, the monster reaches 0 Body, or the target resurrects via their Death Count ending. This ability is usually for Spirits, but some powerful Demons or other creatures may also be able to possess creatures with or without Mysticism, or even objects."},
  {name:"Pounce",cat:"Monster Ability",
   call:"Physical Pounce",
   delivery:"Packet Delivered (Physical)",
   desc:"The monster 'jumps' onto a target and stuns them for 5 seconds. This ability cannot be done to a target within boffer reach of the monster. After throwing the packet, the monster must run to roughly where it landed. Note: Do not actually jump on the target."},
  {name:"Pull",cat:"Monster Ability",
   call:"Physical Pull <X> Strength",
   delivery:"Weapon Swing, Packet Delivered (Physical)",
   desc:"This monster may pull targets toward itself using its superior strength. The target must move as close to the monster as possible, in a straight line, at a running pace if their Strength is less than the monster's Strength bonus. If the target has a higher Strength bonus than the number used in Pull's call, they may resist it by calling \"No Effect\". Some monsters may pull a target to a specific location as described by a Shaper, such as tentacles dragging targets toward a pit."},
  {name:"Push",cat:"Monster Ability",
   call:"Weapon Swing: \"Massive Physical Push <X> Strength\" OR Packet Delivered: \"Physical Push <X> Strength\"",
   delivery:"Weapon Swing, Packet Delivered (Physical)",
   desc:"This monster can generate incredible force that can send its enemies flying, either by buffeting wings, a ramming charge, or a supernatural shove. If delivered via a physical weapon strike, it will affect a creature whether they physically block the swing or not, akin to a Massive attack. The target must move directly away from the attacker as if they were pushed with Strength as normal. If the target has equal to or greater Strength than the number used in Push's call, they may resist it by calling \"No Effect\"."},
  {name:"Rabid",cat:"Monster Ability",
   call:"(Passive — listed in Monster Features and Vulnerabilities)",
   delivery:"N/A",
   desc:"Animals that are \"Rabid\" cannot be affected by Charm Effects unless it is a racial vulnerability, as their minds are too far gone. If the Animal has a Bite attack, it now adds the \"Nausea\" Carrier Effect to the attack. The physical description of the monster should be adjusted to include foaming at the mouth. This is usually listed in the \"Monster Features and Vulnerabilities\" section of a stat block."},
  {name:"<Realm> Walk",cat:"Monster Ability",
   call:"\"<Realm> Walk\" on a 3-count",
   delivery:"N/A",
   desc:"A monster with this ability can enter a different realm mentioned in the name of the incant, such as the Plane of Faerie, the Celestial Planes, the Hellstack Plane, etc. Doing so requires a 3-count to exit or enter it, \"<Realm> Walk 1, <Realm> Walk 2, <Realm> Walk 3\". During this count the monster may still be attacked, however this does not interrupt the count. While this ability is active, the monster goes Out-of-Game and may pass through magical barriers (both Battle Magic and Ritual) but not more powerful types of barriers, such as Vaults. Note: A Fae that is touching iron in any way cannot use Fae Walk."},
  {name:"Reduce: <Type>",cat:"Monster Ability",
   call:"Reduce",
   delivery:"N/A",
   desc:"The monster takes half damage from a certain damage type. They state this ability's call when hit with such damage to indicate this (use discretion in saying \"Active Reduce\" once if hit by the same damage type over and over by the same PC/group of PCs)."},
  {name:"Reflect <Type>",cat:"Monster Ability",
   call:"\"Reflect Magic\" OR \"Reflect Fire\"",
   delivery:"N/A",
   desc:"The monster reflects effects of a certain type back at the attacker. The monster defends against the effect, and the attacker is immediately hit by that effect."},
  {name:"Regeneration (X Body/Y Minutes)",cat:"Monster Ability",
   call:"\"Visibly Regenerating\" when Body Points are regained",
   delivery:"N/A",
   desc:"This monster can slowly heal over time. <X> refers to the number of Body Points per <Y> number of units of time, which is the number of Body Points Mended in that time frame. Regeneration can only be stopped by a specific source (Ex. Acid, Fire, Silver, etc.) and should be stated in the individual monster's statistics. Ex. Regeneration (10 Body/Minute unless damaged by Fire). Any amount of damage from that specific source will prevent Regeneration from functioning for 10 minutes."},
  {name:"Resist <Type> or <Lesser/Greater> Resist Magic",cat:"Monster Ability",
   call:"\"Resist Physical\" OR \"Lesser Resist Magic\" OR \"Greater Resist Magic\"",
   delivery:"N/A",
   desc:"Allows the monster to resist one instance of one type of effect. If used for Magic, Lesser Resist Magic works on only Battle Magic-level effects (except Elemental damage). Greater Resist Magic will work on any magical effect Battle Magic-level or greater, including Arcane-level magic and Elemental damage. These calls are especially important, as they indicate to the attacker that there is a finite amount of resists at the monster's disposal, as opposed to \"No Effect\" which indicates complete immunity."},
  {name:"Ricochet <Magic/Arcane>",cat:"Monster Ability",
   call:"\"Ricochet Magic - Ego Rend\" OR \"Ricochet Arcane Call Meteor\"",
   delivery:"Packet Delivered",
   desc:"This ability will allow the monster to unleash stored Battle Magic or Ritual Magic (if \"Ricochet Magic\") or any level of magic (if \"Ricochet Arcane\") and return it back to the caster via its call. This is typically paired with the Absorb ability (see above) to unleash a spell stored by Absorb within 3 seconds of it being absorbed. The spell being ricocheted is an exact duplicate of the original spell with the monster considered to be the caster, though it is cast innately."},
  {name:"Ritual Caster: <X>",cat:"Monster Ability",
   call:"(Passive — no call)",
   delivery:"N/A",
   desc:"The monster can read rituals, and cast rituals with <X> number of ritual slots listed."},
  {name:"Sense <Type>",cat:"Monster Ability",
   call:"\"Sense Life\" OR \"Sense Demonic\"",
   delivery:"N/A",
   desc:"This an Out-of-Game call which a monster uses to sense <Type>, similar to a sonar ping. To use this ability, it states the call in a normal speaking voice, and anything the Sense call applies to that can hear the call Out-of-Game must answer back \"Here\" at speaking level, also Out-of-Game. Covering your ears does not make you immune to this call."},
  {name:"Shadow Walk",cat:"Monster Ability",
   call:"\"Shadow Walk\" on a 3-count",
   delivery:"N/A",
   desc:"This monster can become invisible and intangible in darkness, which is defined as being unable to read words on a page at arm's length. While in darkness, it may perform a whispered 3-count, \"Shadow Walk 1, Shadow Walk 2, Shadow Walk 3\". During this count the monster may still be attacked, however this does not interrupt the count. At the end of the count, the monster enters the shadows and goes Out-of-Game. While Shadow Walking, the monster can still see and hear around it, and will still \"Sense\" as being present, but cannot use any skills or manipulate physical objects in any way, much like the Gaseous Form ability. If the area becomes lit so that it is no longer considered to be in darkness, the monster will be forced to immediately exit the Shadow Walk by stating \"Burst Forth\", becoming material once again. This in all ways also counts as the <Realm> Walk ability (see above)."},
  {name:"Shatter",cat:"Monster Ability",
   call:"Weapon Swing: \"Physical Shatter\" OR Packet Delivered: \"Magic Shatter <Weapon/Shield to be Shattered>\"",
   delivery:"Weapon Swing, Packet Delivered (Magic)",
   desc:"This ability will cause any weapon or shield held or carried by the target to shatter into many pieces if it is not indestructible or has defences against Shatter effects. If used as a physical weapon strike, it must hit the weapon or shield to be shattered, otherwise the Shatter will fail. If the Shatter is packet delivered, it may hit the target anywhere, as the weapon or shield to be shattered is specified in the call. If the weapon or shield is omitted from the packet delivered call, the target is free to choose which one they are holding takes the Shatter effect."},
  {name:"Soft Resist",cat:"Monster Ability",
   call:"Soft Resist!",
   delivery:"N/A",
   desc:"This ability is something the Monster Marshal or Shaper may add to an existing monster. It can be used to resist any effect that will take the monster out of combat. The purpose of this skill is to allow certain specific monsters to challenge larger groups of players and not die too easily to a single spell or ability, thus ending the encounter too quickly. Any ability that is resisted through a \"Soft Resist\" is not considered used for the day and will return to the PC in 30 minutes. Ex. A PC hits a powerful monster with a Web spell. The monster calls \"Soft Resist!\" and takes no effect from the Web. 30 minutes later the PC has regained the use of that Web spell."},
  {name:"Soul Leech",cat:"Monster Ability",
   call:"\"Soul Leech\" on a 5-count",
   delivery:"N/A",
   desc:"This is a form of killing blow that is performed with a 5-count, \"Soul Leech 1, Soul Leech 2\", etc. At the end of the count, the target drops to its Death Count, the monster is Mended to its full Body Points, and any Natural Armour it has is restored to full. It requires physical touch by the monster on the target to perform, and visibly looks like the monster siphoning wisps of energy from the target."},
  {name:"Special <(Name)>",cat:"Monster Ability",
   call:"(Unique — varies per monster)",
   delivery:"Unique",
   desc:"This is a special passive ability, or trait that modifies an ability, that the monster has. Its effects are designed by the Shaper specifically for the monster in question. Ex. An Earth Elemental being unable to run unless burrowed, an Owlbear being able to Spellstrike its Nature spells, or a Boogey Man being able to steal dreams. Note: If a special ability gives the monster a specific vulnerability or weakness, it is considered a racial vulnerability."},
  {name:"Sphere of <Sphere Name>",cat:"Monster Ability",
   call:"\"Magic <Spell Name>\" (silent cast) or full incant",
   delivery:"N/A",
   desc:"The monster has knowledge of Spheres of Magic, can cast spells using spell slots without need for memorization, and \"spawns In-Game\" with any possible spells a PC could have \"started the game with.\" Its spell pyramid will be indicated in its statistics (Ex. Sphere of Nature: 4/3/2/1). If it can cast multiple Spheres they will be separated by \"/\" and if it has a choice of Spheres each will be separated by the word \"OR\" (Ex. Sphere of Nature/Protection vs. Sphere of Nature OR Protection). The spells it casts can be countered by Wytch Hunters or defended by a defence that would stop that sphere. If the monster can cast spells silently without an incant, it states \"Magic <Spell Name>\" instead of the incant. This will be indicated as a Special ability; usually \"Special (Silent Spells)\" for Touch Casting or Packet Delivered spells, or \"Special (Spellstrikes)\" for the ability for it to Spellstrike its spells."},
  {name:"Spider Web Poison",cat:"Monster Ability",
   call:"\"Preparing web\" on a 3-count then \"Alchemical Spider Web Poison\"",
   delivery:"Packet Delivered (Alchemical)",
   desc:"This stacking alchemical attack represents a Spider or similar creature spraying webbing across a creature. The webbing must be prepared with a 3-count, \"Preparing web 1, Preparing web 2, Preparing web 3.\" The webbing causes a Snare effect upon the 1st successful hit, a Bind effect on the 2nd hit, and a full Cocoon effect on the 3rd hit. These effects are cumulative. The Snare effect can be ripped free from with +2 Strength (taking 2 Body), or cut free with a 2-minute count. The Bind effect can be ripped free with +4 Strength (taking 4 Body), or cut free by another creature with a 4-minute count. Finally, the Cocoon effect can be ripped free with +8 Strength (taking 8 Body) and can be cut free by another creature with an 8-minute count. While cocooned, a creature is completely helpless, blinded, and silenced. A creature only needs to release itself from the greatest effect in order to be free. Ex. If a creature rips free of the Bind effect, it is also free of the Snare effect at no additional Body damage. This in all ways counts as the \"Sticky Paste\" alchemy, meaning that, for example, Physical and Rotting Undead (see Undead State) are not immune to being sprayed with webs. One dose of Dissolvent alchemy applied to a webbed target will remove one effect of this ability from it, starting from the greatest effect. Ex. A cocooned target would need three doses of Dissolvent to fully release it, but one dose would reduce it to a Bind effect."},
  {name:"Splashback <Effect>",cat:"Monster Ability",
   call:"\"Splashback 5 Acid\" OR \"Splashback Innate Magic Swampwalk\"",
   delivery:"N/A",

  {name:"Steeled Will",cat:"Monster Ability",

   delivery:"N/A",
   desc:"This defensive ability grants the monster complete immunity to all Charm Effects and Mind Altering Effects. It would state \"No Effect\" to any such effect. If desired, these effects may be allowed through the defence to allow the monster to receive beneficial spells and effects."},
  {name:"Stun",cat:"Monster Ability",

  {name:"Suppress <Type of Magic>",cat:"Monster Ability",
   call:"\"Suppressing\" on a 10-count then \"Suppress Magic\" OR \"Suppress Protection\"",
   delivery:"N/A",
   desc:"The monster can temporarily suppress magic it comes in contact with. It must touch the creature or object and perform a 10-count, \"Suppressing 1, Suppressing 2, Suppressing 3, etc.\" A conscious creature can call \"interrupt\" to this count. At the end of the count, the call is stated and any magic coming from the creature or object is suppressed. The magic within the target cannot be used until the monster is no longer in contact with it. More specialised forms of suppression may specify a specific Sphere of Magic, instead of \"Magic\" in general. A creature capable of casting spells cannot cast while suppressed, unless they cast a different Sphere of Magic than the one specified in the call. If \"Suppress Magic\" is used, they can't cast any spells at all."},
  {name:"Thick Bones",cat:"Monster Ability",

  {name:"Trample",cat:"Monster Ability",

  {name:"Venom",cat:"Monster Ability",
   call:"\"5 Body Venom Bite\"",
   delivery:"Weapon Swing",
   desc:"This ability is considered an alchemical Poison, and must be combined with the Bite ability (see \"Bite\" above) unless otherwise stated in specific cases. Once affected, the target is in constant pain (RP effect only) and for 10 minutes they can't cast spells unless they have the Combat Wizardry skill, and are considered to be taking damage for the purposes of skills or abilities that can be stopped by taking Body damage. The only exception is a Physician can still cure the Poison from themselves using their Level 3 ability Physicker. After 10 minutes, the Poison will have worked its way through the target's system and they take \"Alchemical 25 Body Poison\". This effect doesn't stack. While under the effects of Venom, they cannot be affected by Venom again until the 10 minutes are up, or the Poison is removed from their system. This effect can be cured by any means that removes a Poison from a target."},
  {name:"Vulnerability: <Type>",cat:"Monster Ability",
   call:"(Passive — listed in Monster Features and Vulnerabilities)",

   desc:"This monster takes additional damage from a certain damage type (Ex. \"Vulnerability: x4 from Fire\" would mean it takes quadruple the damage from both Magic and Elemental Fire attacks). This is usually listed in the \"Monster Features and Vulnerabilities\" section of a stat block."},
  {name:"Wail of Death",cat:"Monster Ability",
   call:"Magic Wail of Death",
